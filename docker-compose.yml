services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: musicdigger
      POSTGRES_PASSWORD: musicdigger
      POSTGRES_DB: musicdigger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musicdigger"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://musicdigger:musicdigger@postgres:5432/musicdigger
      DATABASE_URL_SYNC: postgresql+psycopg2://musicdigger:musicdigger@postgres:5432/musicdigger
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      APP_ENV: development
      APP_DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://musicdigger:musicdigger@postgres:5432/musicdigger
      DATABASE_URL_SYNC: postgresql+psycopg2://musicdigger:musicdigger@postgres:5432/musicdigger
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.celery_app:celery_app worker --loglevel=info

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL_SYNC: postgresql+psycopg2://musicdigger:musicdigger@postgres:5432/musicdigger
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: alembic upgrade head
    profiles:
      - migrate

volumes:
  postgres_data:
  redis_data:
