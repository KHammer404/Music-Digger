name: music_digger
description: "Music Digger - Discover all music across 8 platforms"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^14.8.1

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Network
  dio: ^5.8.0+1

  # Local Database
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Audio Playback
  just_audio: ^0.9.43
  just_audio_background: ^0.0.1-beta.15
  just_audio_media_kit: ^2.0.6
  media_kit_libs_linux: any
  audio_service: ^0.18.17

  # YouTube
  youtube_explode_dart: ^2.3.8

  # URL Launcher
  url_launcher: ^6.3.1

  # User / Persistence
  shared_preferences: ^2.3.5
  uuid: ^4.5.1

  # Intl
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  injectable_generator: ^2.7.0
  drift_dev: ^2.23.1

flutter:
  uses-material-design: true
  generate: true
